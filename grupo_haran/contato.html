<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Haran Grupo de Dança</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contato-container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .contato-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        
        .info-card {
            background: var(--preto-claro);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--cinza);
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }
        
        .info-card:hover {
            border-color: var(--dourado);
            transform: translateY(-5px);
        }
        
        .info-card h3 {
            color: var(--dourado);
            margin-bottom: 1rem;
        }
        
        .info-card p {
            margin-bottom: 0.5rem;
            word-break: break-word;
        }
        
        .info-card a {
            color: var(--cinza-claro);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .info-card a:hover {
            color: var(--dourado);
        }
        
        .redes-contato {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        
        .redes-contato a {
            display: inline-block;
            background: transparent;
            border: 2px solid var(--dourado);
            color: var(--dourado);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.3s;
        }
        
        .redes-contato a:hover {
            background: linear-gradient(135deg, var(--dourado), var(--dourado-escuro));
            color: #000;
            box-shadow: 0 0 15px var(--dourado-glow);
            transform: scale(1.02);
        }
        
        .form-contato {
            background: var(--preto-claro);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--cinza);
        }
        
        .form-contato h3 {
            color: var(--dourado);
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--dourado);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid var(--cinza);
            border-radius: 8px;
            color: white;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--dourado);
            box-shadow: 0 0 10px var(--dourado-glow);
        }
        
        .btn-enviar {
            background-color: var(--dourado);
            color: #000;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-enviar:hover {
            background-color: #b8860b;
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--dourado-glow);
        }
        
        .loading-contato {
            text-align: center;
            padding: 2rem;
            color: var(--dourado);
        }
        
        .mensagem-sucesso {
            background-color: #1e7e34;
            color: white;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        
        @media (max-width: 768px) {
            .contato-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <div class="contato-container">
                <h2 class="section-title">📞 Contato</h2>
                <p style="text-align: center; margin-bottom: 2rem;">Entre em contato para contratações, parcerias ou convites para eventos</p>
                
                <div id="contato-conteudo">
                    <div class="loading-contato">🎭 Carregando informações de contato...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/include.js"></script>
    <script src="js/efeitos.js"></script>
    <script>
        async function carregarContato() {
            const container = document.getElementById('contato-conteudo');
            container.innerHTML = '<div class="loading-contato">🎭 Carregando informações de contato...</div>';
            
            try {
                // Usa a função já existente no configuracoes.js
                const config = await carregarConfiguracoes();
                
                const email = config.email || "harangrupodedanca@gmail.com";
                const telefone = config.telefone || "(81) 99999-9999";
                const instagram = config.instagram || "#";
                const facebook = config.facebook || "#";
                const youtube = config.youtube || "#";
                
                let whatsappLink = config.whatsapp || `https://wa.me/55${telefone.replace(/\D/g, '')}`;
                if (whatsappLink !== "#" && !whatsappLink.includes("wa.me") && !whatsappLink.includes("api.whatsapp")) {
                    const numeros = whatsappLink.replace(/\D/g, '');
                    if (numeros.length >= 10) {
                        whatsappLink = `https://wa.me/55${numeros}`;
                    }
                }
                
                const html = `
                    <div class="contato-grid">
                        <div>
                            <div class="info-card">
                                <h3>📧 E-mail</h3>
                                <p><a href="mailto:${email}">${email}</a></p>
                            </div>
                            <div class="info-card">
                                <h3>📱 WhatsApp</h3>
                                <p><a href="${whatsappLink}" target="_blank">${telefone}</a></p>
                            </div>
                            <div class="info-card">
                                <h3>📍 Localização</h3>
                                <p>Bom Jardim - PE</p>
                            </div>
                            <div class="info-card">
                                <h3>🌐 Redes Sociais</h3>
                                <div class="redes-contato">
                                    <a href="${instagram}" target="_blank" id="contato-instagram">📷 Instagram</a>
                                    <a href="${facebook}" target="_blank" id="contato-facebook">📘 Facebook</a>
                                    <a href="${youtube}" target="_blank" id="contato-youtube">🎬 YouTube</a>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <form class="form-contato" action="https://formsubmit.co/${email}" method="POST">
                                <h3>✉️ Envie uma mensagem</h3>
                                <input type="hidden" name="_subject" value="Novo contato do site - Haran Grupo de Dança">
                                <input type="hidden" name="_captcha" value="false">
                                <input type="hidden" name="_next" value="https://jrvaldir.github.io/contato.html?enviado=sucesso">
                                
                                <div class="form-group">
                                    <label for="nome">Nome</label>
                                    <input type="text" id="nome" name="nome" required>
                                </div>
                                <div class="form-group">
                                    <label for="email_cliente">E-mail</label>
                                    <input type="email" id="email_cliente" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="assunto">Assunto</label>
                                    <input type="text" id="assunto" name="assunto" required>
                                </div>
                                <div class="form-group">
                                    <label for="mensagem">Mensagem</label>
                                    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn-enviar">📨 Enviar mensagem →</button>
                            </form>
                            <div id="mensagem-sucesso" class="mensagem-sucesso">
                                ✅ Mensagem enviada com sucesso! Entraremos em contato em breve.
                            </div>
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
                
                // Verifica se foi enviado com sucesso
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('enviado') === 'sucesso') {
                    const sucessoDiv = document.getElementById('mensagem-sucesso');
                    if (sucessoDiv) {
                        sucessoDiv.style.display = 'block';
                        setTimeout(() => {
                            sucessoDiv.style.display = 'none';
                        }, 8000);
                    }
                }
                
            } catch (error) {
                console.error("Erro ao carregar contato:", error);
                container.innerHTML = `
                    <div class="contato-grid">
                        <div>
                            <div class="info-card">
                                <h3>📧 E-mail</h3>
                                <p><a href="mailto:harangrupodedanca@gmail.com">harangrupodedanca@gmail.com</a></p>
                            </div>
                            <div class="info-card">
                                <h3>📱 WhatsApp</h3>
                                <p><a href="https://wa.me/5581999999999" target="_blank">(81) 99999-9999</a></p>
                            </div>
                            <div class="info-card">
                                <h3>📍 Localização</h3>
                                <p>Bom Jardim - PE</p>
                            </div>
                            <div class="info-card">
                                <h3>🌐 Redes Sociais</h3>
                                <div class="redes-contato">
                                    <a href="#" target="_blank">📷 Instagram</a>
                                    <a href="#" target="_blank">📘 Facebook</a>
                                    <a href="#" target="_blank">🎬 YouTube</a>
                                </div>
                            </div>
                        </div>
                        <div>
                            <form class="form-contato" action="https://formsubmit.co/harangrupodedanca@gmail.com" method="POST">
                                <h3>✉️ Envie uma mensagem</h3>
                                <input type="hidden" name="_subject" value="Novo contato do site - Haran Grupo de Dança">
                                <input type="hidden" name="_captcha" value="false">
                                <div class="form-group">
                                    <label for="nome">Nome</label>
                                    <input type="text" id="nome" name="nome" required>
                                </div>
                                <div class="form-group">
                                    <label for="email_cliente">E-mail</label>
                                    <input type="email" id="email_cliente" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="assunto">Assunto</label>
                                    <input type="text" id="assunto" name="assunto" required>
                                </div>
                                <div class="form-group">
                                    <label for="mensagem">Mensagem</label>
                                    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                                </div>
                                <button type="submit" class="btn-enviar">📨 Enviar mensagem →</button>
                            </form>
                        </div>
                    </div>
                `;
            }
        }
        
        carregarContato();
    </script>
</body>
</html>
