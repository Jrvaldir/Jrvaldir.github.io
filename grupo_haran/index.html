<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haran Grupo de Dança - Arte e Cultura</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <!-- Banner principal -->
        <div id="banner-principal" class="banner" style="background-size: cover; background-position: center; padding: 4rem 1rem; text-align: center;">
            <div class="container">
                <h1 style="font-size: 3rem; color: var(--dourado); margin-bottom: 1rem;">Haran Grupo de Dança</h1>
                <p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Levando arte, cultura e emoção através da dança teatral e apresentações que marcam o coração do público.</p>
                <a href="catalogo.html" class="card-botao" style="margin-top: 2rem; display: inline-block;">Conheça nosso trabalho →</a>
            </div>
        </div>

        <!-- Últimos eventos -->
        <div class="container">
            <h2 class="section-title">Últimos Eventos</h2>
            <div id="ultimos-eventos">
                <div class="loading">🎭 Carregando eventos...</div>
            </div>
            <div style="text-align: center; margin-top: 2rem;">
                <a href="catalogo.html" class="card-botao">Ver todos os eventos →</a>
            </div>
        </div>

        <!-- Sobre resumido -->
        <div class="container" style="background-color: var(--preto-claro); border-radius: 12px; margin-top: 2rem;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: center;">
                <div>
                    <h2 class="section-title" style="text-align: left;">Sobre o Grupo</h2>
                    <div id="resumo-historia">
                        <div class="loading">🎭 Carregando...</div>
                    </div>
                    <a href="sobre.html" class="card-botao" style="margin-top: 1rem;">Saiba mais →</a>
                </div>
                <div>
                    <img id="imagem-sobre-resumo" src="https://placehold.co/500x300?text=Haran+em+Acao" style="width: 100%; border-radius: 12px;" alt="Haran em ação">
                </div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/configuracoes.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/include.js"></script>
    <script src="js/efeitos.js"></script>
    <script>
        // Carrega os últimos 3 eventos
        carregarEventos().then(eventos => {
            exibirEventos(eventos, "ultimos-eventos", 3);
        });
        
        // Carrega as imagens da planilha
        async function carregarImagensIndex() {
            try {
                const config = await carregarConfiguracoes();
                
                // 1. Banner principal (fundo)
                const bannerUrl = config.banner_url ? converterLinkGoogleDrive(config.banner_url, "w1920") : "";
                const bannerDiv = document.getElementById('banner-principal');
                if (bannerDiv && bannerUrl) {
                    bannerDiv.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${bannerUrl}')`;
                    console.log("✅ Banner carregado da planilha");
                }
                
                // 2. Imagem do card "Sobre o Grupo"
                const sobreImagemUrl = config.banner_url ? converterLinkGoogleDrive(config.banner_url, "w500") : "";
                const sobreImg = document.getElementById('imagem-sobre-resumo');
                if (sobreImg && sobreImagemUrl) {
                    sobreImg.src = sobreImagemUrl;
                    console.log("✅ Imagem do sobre carregada da planilha");
                }
                
            } catch (error) {
                console.error("Erro ao carregar imagens:", error);
            }
        }
        
        // Carrega resumo da história da planilha
        async function carregarResumoHistoria() {
            const container = document.getElementById('resumo-historia');
            if (!container) return;
            
            try {
                const config = await carregarConfiguracoes();
                const historiaCompleta = config.historia || "";
                
                if (historiaCompleta) {
                    const resumo = historiaCompleta.substring(0, 400) + (historiaCompleta.length > 400 ? "..." : "");
                    container.innerHTML = `<p>${resumo}</p>`;
                } else {
                    container.innerHTML = `<p>História do grupo em breve...</p>`;
                }
            } catch (error) {
                console.error("Erro ao carregar resumo:", error);
                container.innerHTML = `<p>Carregando história do grupo...</p>`;
            }
        }
        
        // Executa tudo
        carregarImagensIndex();
        carregarResumoHistoria();
    </script>
</body>
</html>
