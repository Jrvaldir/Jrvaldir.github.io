<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Haran Grupo de Dança</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <div class="container">
            <h2 class="section-title">📸 Catálogo de Apresentações</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Todos os eventos e apresentações do Haran Grupo de Dança</p>
            
            <div id="catalogo-completo">
                <div class="loading">🎭 Carregando catálogo...</div>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/config.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/include.js"></script>
    <script src="js/efeitos.js"></script>
    <script>
        // Carrega todos os eventos no catálogo
        carregarEventos().then(eventos => {
            exibirEventos(eventos, "catalogo-completo");
        });
    </script>
</body>
</html>
